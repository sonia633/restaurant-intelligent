<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Codes des tables — Restaurant Intelligent</title>
  <style>
    body { font-family:system-ui,Segoe UI,sans-serif; background:#faf7f2; color:#2c2c2c; margin:0; padding:20px; }
    h1 { color:#c0392b; }
    .info { background:#fff; border:1px solid #eee; border-radius:10px; padding:14px 16px; margin-bottom:18px; }
    .info code { background:#f4f0ea; padding:2px 6px; border-radius:5px; }
    .info input { padding:8px; width:340px; max-width:90%; border:1px solid #ccc; border-radius:6px; }
    .info button { padding:8px 14px; border:none; background:#c0392b; color:#fff; border-radius:6px; cursor:pointer; }
    .grid { display:flex; flex-wrap:wrap; gap:18px; }
    .card { background:#fff; border:1px solid #eee; border-radius:14px; padding:18px; text-align:center;
            box-shadow:0 1px 5px rgba(0,0,0,.06); width:260px; }
    .card h2 { margin:0 0 6px; }
    .card img { width:230px; height:230px; }
    .card .url { font-size:12px; color:#888; word-break:break-all; margin-top:8px; }
    @media print {
      .info, .noprint { display:none; }
      .card { page-break-inside:avoid; }
    }
  </style>
</head>
<body>
  <h1>📲 QR Codes des tables</h1>

  <div class="info">
    <p>Les QR Codes pointent vers : <code id="baseShow">…</code></p>
    <p style="font-size:14px;color:#555;">
      ⚠️ Pour scanner avec un <b>téléphone</b>, le téléphone doit être sur le <b>même Wi-Fi</b> que ce PC.
      Si l'IP détectée ne marche pas, saisis l'IP de ton PC ci-dessous.
    </p>
    <input id="baseInput" placeholder="http://192.168.1.10:3000" />
    <button onclick="applyBase()">Régénérer</button>
    <button class="noprint" onclick="window.print()">🖨️ Imprimer</button>
  </div>

  <div class="grid" id="grid"></div>

  <script>
    let base = "";
    let tables = [];

    fetch("/api/server-info").then(r => r.json()).then(info => {
      base = "http://" + info.lanIp + ":" + info.port;
      tables = info.tables;
      document.getElementById("baseInput").value = base;
      render();
    });

    function applyBase() {
      base = document.getElementById("baseInput").value.replace(/\/$/, "");
      render();
    }

    function render() {
      document.getElementById("baseShow").textContent = base;
      const grid = document.getElementById("grid");
      grid.innerHTML = tables.map(t => {
        const url = base + "/menu?table=" + t;
        const img = "/api/qrcode?table=" + t + "&base=" + encodeURIComponent(base);
        return `<div class="card">
          <h2>Table ${t}</h2>
          <img src="${img}" alt="QR Table ${t}" />
          <div class="url">${url}</div>
        </div>`;
      }).join("");
    }
  </script>
</body>
</html>
